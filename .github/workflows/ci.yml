name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing

      - name: Confirm samples render
        run: |
          uv run python scripts/make_pdf.py
          test -s samples/purchase_order.pdf

      - name: Confirm slide deck builds
        run: |
          uv run python scripts/make_slides.py
          test -s slides/graphiterx_demo.pptx
